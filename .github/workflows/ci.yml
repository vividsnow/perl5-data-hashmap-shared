name: CI
on:
  push:
    branches: ['*']
  pull_request:

jobs:
  debian:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        perl: ['5.22', '5.32', '5.40']
    name: Debian / Perl ${{ matrix.perl }}
    steps:
      - uses: actions/checkout@v4
      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}
      - run: cpanm -n Devel::PPPort XS::Parse::Keyword
      - run: perl Makefile.PL && make && make test

  alpine:
    runs-on: ubuntu-latest
    name: Alpine / musl
    steps:
      - uses: actions/checkout@v4
      - uses: jirutka/setup-alpine@v1
        with:
          packages: perl perl-dev perl-app-cpanminus make gcc musl-dev linux-headers
      - run: cpanm -n Module::Build ExtUtils::CChecker Devel::PPPort XS::Parse::Keyword XS::Parse::Keyword::Builder
        shell: alpine.sh {0}
      - run: perl Makefile.PL && make && make test
        shell: alpine.sh {0}
        env:
          PERL5LIB: /home/runner/perl5/lib/perl5

  test-arm:
    runs-on: ubuntu-24.04-arm
    name: ARM64 / Linux
    steps:
      - uses: actions/checkout@v4
      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.40'
      - run: cpanm -n Devel::PPPort XS::Parse::Keyword
      - run: perl Makefile.PL && make && make test

  test-ubsan:
    runs-on: ubuntu-latest
    name: UBSan
    steps:
      - uses: actions/checkout@v4
      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.40'
      - run: cpanm -n XS::Parse::Keyword Devel::PPPort
      - run: perl Makefile.PL OPTIMIZE='-g -fsanitize=undefined -fno-omit-frame-pointer'
      - run: make
      - name: test under UBSan
        run: |
          UBSAN_LIB=$(cc -print-file-name=libubsan.so)
          LD_PRELOAD=$UBSAN_LIB UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1 make test

  test-xt:
    runs-on: ubuntu-latest
    name: AUTHOR_TESTING (xt/)
    steps:
      - uses: actions/checkout@v4
      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.40'
      - run: cpanm -n XS::Parse::Keyword Devel::PPPort BSD::Resource Time::HiRes
      - run: perl Makefile.PL && make
      - run: AUTHOR_TESTING=1 prove -b -j2 xt/*.t
        env:
          AUTHOR_TESTING: 1

  test-asan:
    runs-on: ubuntu-latest
    name: ASan
    steps:
      - uses: actions/checkout@v4
      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.40'
      - run: cpanm -n XS::Parse::Keyword Devel::PPPort
      - run: perl Makefile.PL OPTIMIZE='-g -fsanitize=address -fno-omit-frame-pointer'
      - run: make
      - name: test under ASan
        run: |
          ASAN_LIB=$(cc -print-file-name=libasan.so)
          LD_PRELOAD=$ASAN_LIB ASAN_OPTIONS=detect_leaks=0 make test


  test-valgrind:
    runs-on: ubuntu-latest
    name: valgrind
    steps:
      - uses: actions/checkout@v4
      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.40'
      - run: sudo apt-get update && sudo apt-get install -y valgrind
      - run: cpanm -n XS::Parse::Keyword Devel::PPPort
      - run: perl Makefile.PL && make
      - name: test under valgrind
        run: |
          for t in t/*.t; do
            echo "== valgrind $t =="
            valgrind --leak-check=full --error-exitcode=42 --errors-for-leak-kinds=definite perl -Mblib "$t" || exit 1
          done
